name: Refresh Data Snapshot

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    name: Build forecast & deploy static JSON to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run forecast generator
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          OUTPUT_DIR: ./output
        run: python backend/generate_static.py

      - name: Validate output
        run: |
          FUND_COUNT=$(python3 -c "import json; d=json.load(open('output/snapshot.json')); print(len(d.get('funds',[])))")
          echo "Fund count: $FUND_COUNT"
          if [ "$FUND_COUNT" -eq "0" ]; then
            echo "No funds — aborting"
            exit 1
          fi
          echo "snapshot.json valid — $FUND_COUNT funds"
          # Copy snapshot into frontend/public/ for repo commit
          cp output/snapshot.json frontend/public/snapshot.json

      - name: Upload all JSON files to cPanel via FTP
        run: |
          for f in snapshot.json track-record.json predictions-status.json model-insights.json meta.json; do
            if [ -f "output/$f" ]; then
              curl -sS -T "output/$f" \
                "ftp://${{ secrets.FTP_HOST }}/$f" \
                --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
                --ftp-create-dirs
              echo "uploaded $f"
            fi
          done
          echo "All JSON files uploaded to cPanel"

      - name: Commit snapshot to repo
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add frontend/public/snapshot.json
          # Also commit weights if they changed
          git add backend/weights.json backend/weights_30d.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update forecast data [skip ci]" && git push)
